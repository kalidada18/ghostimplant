# ─────────────────────────────────────────────────────────
# GHOST C2 — Root wrangler config
# Points Cloudflare CI to the worker subdirectory.
# The actual config lives at worker/wrangler.toml —
# run all wrangler commands from the worker/ directory.
# ─────────────────────────────────────────────────────────

name = "ghost-c2"
main = "worker/src/index.ts"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "GHOST_KV"
id = "94300d2c32d448768c4a84d9db1445f4"

[vars]
SESSION_TIMEOUT_SECONDS = "3600"
CORS_ORIGIN = "*"

[dev]
port = 8787
local_protocol = "https"
